<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>크맵 - 게시글 목록</title>

  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/boards.css" />
</head>
<body>
<header class="header">
    <h1 class="header__title">크맵</h1>

  <div class="header__profile">
    <button type="button" class="header__profile-button" id="profileButton" aria-label="프로필 메뉴">
      <span class="header__profile-image"></span>
    </button>

    <div class="profile-dropdown" id="profileDropdown">
      <button type="button" class="profile-dropdown__item" id="editProfileMenu">
        회원정보수정
      </button>
      <button type="button" class="profile-dropdown__item" id="editPasswordMenu">
        비밀번호수정
      </button>
      <button type="button" class="profile-dropdown__item" id="logoutMenu">
        로그아웃
      </button>
    </div>
  </div>
</header>

  <main class="boards-page">
    <section class="boards">
      <div class="boards__hero">
        <div class="boards__intro">
          <p class="boards__eyebrow">교통사고 과실 투표 커뮤니티</p>
          <h2>사고 상황을 공유하고<br />함께 판단해 보세요.</h2>
          <p>사진과 설명을 확인하고 A·B 차량 중 더 과실이 크다고 생각하는 쪽에 투표하세요.</p>
        </div>
        <button type="button" class="write-button" id="writeButton">
          + 사고 사례 등록
        </button>
      </div>

      <div class="board-toolbar">
        <div class="board-tabs" role="tablist" aria-label="게시글 필터">
          <button class="board-tab is-active" type="button" role="tab" data-filter="all">전체 게시글</button>
          <button class="board-tab" type="button" role="tab" data-filter="hot">🔥 HOT 게시글</button>
        </div>
        <span class="board-count" id="boardCount"></span>
      </div>

      <section class="board-list" id="boardList" aria-label="게시글 목록">
        <!-- JS에서 게시글 카드 렌더링 -->
      </section>

      <div class="loading" id="loading">게시글을 불러오는 중...</div>
    </section>
  </main>

  <script type="module" src="../js/profile-dropdown.js"></script>
  <script type="module" src="../js/boards.js"></script>
</body>
</html>
