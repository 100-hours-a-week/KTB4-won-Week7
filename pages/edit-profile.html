<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>크맵 - 회원정보수정</title>

  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/edit-profile.css" />
</head>
<body>
  <header class="header">
    <h1 class="header__title">크맵</h1>

    <div class="profile-menu-wrapper">
      <button type="button" class="header__profile-button" id="profileButton" aria-label="프로필 메뉴">
        <span class="header__profile-image"></span>
      </button>

      <nav class="profile-dropdown" id="profileDropdown">
        <button type="button" class="profile-dropdown__item" id="editProfileMenu">
          회원정보수정
        </button>
        <button type="button" class="profile-dropdown__item" id="editPasswordMenu">
          비밀번호수정
        </button>
        <button type="button" class="profile-dropdown__item" id="logoutMenu">
          로그아웃
        </button>
      </nav>
    </div>
  </header>

  <main class="edit-profile-page">
    <div class="account-shell">
      <aside class="account-brand">
        <div class="account-brand__logo"><span class="account-brand__mark"></span><strong>크맵</strong></div>
        <div><p class="account-brand__eyebrow">MY KMAP</p><h2>나를 표현하는 정보를<br />관리해 보세요.</h2><p>프로필 사진과 닉네임은 게시글과 댓글에 함께 표시됩니다.</p></div>
      </aside>
    <section class="edit-profile">
      <p class="account-form__eyebrow">계정 관리</p>
      <h2 class="edit-profile__title">회원정보수정</h2>

      <form class="edit-profile-form" id="editProfileForm" novalidate>
        <div class="profile-image-section">
          <label class="form-label">프로필 사진*</label>

          <label for="profileImageInput" class="profile-image-box" id="profileImageBox">
            <img
              alt="프로필 이미지"
              class="profile-preview"
              id="profilePreview"
            />
            <span class="profile-image-overlay">변경</span>
          </label>

          <input
            type="file"
            id="profileImageInput"
            class="profile-image-input"
            accept="image/*"
          />
        </div>

        <div class="form-area">
          <div class="form-group">
            <label class="form-label">이메일</label>
            <p class="email-text" id="emailText">startupcode@gmail.com</p>
          </div>

          <div class="form-group">
            <label for="nickname" class="form-label">닉네임</label>
            <input
              type="text"
              id="nickname"
              class="nickname-input"
              value="스타트업코드"
              maxlength="10"
            />
            <p class="helper-text" id="nicknameHelper"></p>
          </div>

          <button type="submit" class="edit-button" id="editButton">
            수정하기
          </button>
        </div>
      </form>

      <button type="button" class="withdraw-button" id="withdrawButton">
        회원 탈퇴
      </button>

      <p class="toast-message" id="toastMessage">수정완료</p>
    </section>
    </div>
  </main>

  <div class="modal-backdrop" id="withdrawModal" aria-hidden="true">
    <div class="modal">
      <h3 class="modal__title">회원탈퇴 하시겠습니까?</h3>
      <p class="modal__description">작성된 게시글과 댓글은 삭제됩니다.</p>

      <div class="modal__actions">
        <button type="button" class="modal-button modal-button--cancel" id="cancelWithdrawButton">
          취소
        </button>
        <button type="button" class="modal-button modal-button--confirm" id="confirmWithdrawButton">
          확인
        </button>
      </div>
    </div>
  </div>
  <script type="module" src="../js/edit-profile.js"></script>
</body>
</html>
