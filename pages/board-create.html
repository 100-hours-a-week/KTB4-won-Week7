<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>크맵 - 사고 사례 등록</title>

  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/board-create.css" />
</head>
<body>
  <header class="header">
    <button type="button" class="header__back-button" id="backButton" aria-label="뒤로가기">
      ‹
    </button>

    <h1 class="header__title">크맵</h1>

    <button type="button" class="header__profile-button" id="profileButton" aria-label="프로필 메뉴">
      <span class="header__profile-image"></span>
    </button>
  </header>

  <main class="board-create-page">
    <section class="board-create">
      <h2 class="board-create__title">사고 사례 등록</h2>

      <form class="board-create-form" id="boardCreateForm" novalidate>
        <div class="form-group">
          <label for="title" class="form-label">제목*</label>
          <input
            type="text"
            id="title"
            class="title-input"
            placeholder="예: 비보호 좌회전 중 직진 차량과 충돌했습니다"
            maxlength="26"
          />
        </div>

        <div class="form-group">
          <label for="content" class="form-label">내용*</label>
          <textarea
            id="content"
            class="content-textarea"
            placeholder="사고 당시 도로 상황, 진행 방향, 신호 상태 등을 자세히 적어주세요."
          ></textarea>
          <p class="helper-text" id="formHelper"></p>
        </div>

        <div class="image-upload-group">
          <label for="imageInput" class="form-label">사고 현장 사진</label>

          <div class="image-upload-row">
            <label for="imageInput" class="file-select-button">파일 선택</label>
            <span class="file-name" id="fileName">파일을 선택해주세요.</span>
          </div>

          <input
            type="file"
            id="imageInput"
            class="image-input"
            accept="image/*"
          />
        </div>

        <section class="vote-create-section" aria-labelledby="voteCreateTitle">
          <div class="vote-create-header">
            <div>
              <h3 id="voteCreateTitle">과실 투표</h3>
              <p>독자들이 두 선택지 중 하나에 투표할 수 있습니다.</p>
            </div>
            <label class="vote-toggle">
              <input type="checkbox" id="voteEnabled" />
              <span class="vote-toggle__track" aria-hidden="true"></span>
              <span class="vote-toggle__label">투표 추가</span>
            </label>
          </div>

          <div class="vote-create-fields" id="voteFields" hidden>
            <div class="form-group">
              <label for="voteQuestion" class="form-label">투표 질문*</label>
              <input
                type="text"
                id="voteQuestion"
                class="vote-input"
                placeholder="예: 어느 차량의 과실이 더 크다고 생각하나요?"
                maxlength="80"
                disabled
              />
            </div>
            <div class="vote-option-fields">
              <div class="form-group">
                <label for="voteOptionA" class="form-label"><span class="vote-option-key">A</span> 선택지*</label>
                <input type="text" id="voteOptionA" class="vote-input" placeholder="예: 비보호 좌회전 차량" maxlength="40" disabled />
              </div>
              <div class="form-group">
                <label for="voteOptionB" class="form-label"><span class="vote-option-key">B</span> 선택지*</label>
                <input type="text" id="voteOptionB" class="vote-input" placeholder="예: 맞은편 직진 차량" maxlength="40" disabled />
              </div>
            </div>
            <p class="helper-text" id="voteHelper"></p>
          </div>
        </section>

        <button type="submit" class="submit-button" id="submitButton" disabled>
          사례 등록하기
        </button>
      </form>
    </section>
  </main>

  <script type="module" src="../js/board-create.js"></script>
</body>
</html>
