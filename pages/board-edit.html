<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 게시글 수정</title>

  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/board-edit.css" />
</head>
<body>
  <header class="header">
    <button type="button" class="header__back-button" id="backButton" aria-label="뒤로가기">
      ‹
    </button>

    <h1 class="header__title">아무 말 대잔치</h1>

    <button type="button" class="header__profile-button" id="profileButton" aria-label="프로필 메뉴">
      <span class="header__profile-image"></span>
    </button>
  </header>

  <main class="board-edit-page">
    <section class="board-edit">
      <h2 class="board-edit__title">게시글 수정</h2>

      <form class="board-edit-form" id="boardEditForm" novalidate>
        <div class="form-group">
          <label for="title" class="form-label">제목*</label>
          <input
            type="text"
            id="title"
            class="title-input"
            value="제목 1"
            maxlength="26"
          />
        </div>

        <div class="form-group">
          <label for="content" class="form-label">내용*</label>
          <textarea id="content" class="content-textarea">무엇을 얘기할까요? 아무말이라면, 삶은 항상 놀라운 모험이라고 생각합니다. 우리는 매일 새로운 경험을 하고 배우며 성장합니다. 때로는 어려움과 도전이 있지만, 그것들이 우리를 더 강하고 지혜롭게 만듭니다. 또한 우리는 주변의 사람들과 연결되며 사랑과 지지를 받습니다. 그래서 우리의 삶은 소중하고 의미가 있습니다.
자연도 아름다운 이야기입니다. 우리 주변의 자연은 끝없는 아름다움과 신비로움을 담고 있습니다. 산, 바다, 숲, 하늘 등 모든 것이 우리를 놀라게 만들고 감동시킵니다. 자연은 우리의 생각과 안정감을 주며 우리에게 힘을 주는 곳입니다.
마지막으로, 지식은 항상 탐구는 항상 흥미로운 여정입니다. 우리는 끝없는 지식의 바다에서 배우고 발견할 수 있으며, 이것이 우리를 더 깊이 이해하고 세상을 더 넓게 보게 해줍니다.</textarea>

          <p class="helper-text" id="formHelper"></p>
        </div>

        <div class="image-upload-group">
          <label for="imageInput" class="form-label">이미지</label>

          <div class="image-upload-row">
            <label for="imageInput" class="file-select-button">파일 선택</label>
            <span class="file-name" id="fileName">기존 파일 명</span>
          </div>

          <input
            type="file"
            id="imageInput"
            class="image-input"
            accept="image/*"
          />
        </div>

        <button type="submit" class="submit-button is-active" id="submitButton">
          수정하기
        </button>
      </form>
    </section>
  </main>

  <script src="../js/board-edit.js"></script>
</body>
</html>
