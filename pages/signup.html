<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 회원가입</title>

  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/signup.css" />
</head>
<body>
  <header class="header">
    <button type="button" class="header__back-button" id="backButton" aria-label="뒤로가기">
      ‹
    </button>
    <h1 class="header__title">아무 말 대잔치</h1>
  </header>

  <main class="signup-page">
    <section class="signup">
      <h2 class="signup__title">회원가입</h2>

      <form class="signup-form" id="signupForm" novalidate>
        <div class="profile-section">
          <label class="form-label">프로필 사진</label>
          <p class="helper-text profile-helper" id="profileHelper"></p>

          <label for="profileImageInput" class="profile-uploader" id="profileUploader">
            <span class="profile-uploader__plus" id="profilePlus">+</span>
            <img class="profile-uploader__image" id="profilePreview" alt="프로필 미리보기" />
          </label>

          <input
            type="file"
            id="profileImageInput"
            class="profile-input"
            accept="image/*"
          />
        </div>

        <div class="form-group">
          <label for="email" class="form-label">이메일*</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="이메일을 입력하세요"
            autocomplete="email"
          />
          <p class="helper-text" id="emailHelper"></p>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">비밀번호*</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="비밀번호를 입력하세요"
            autocomplete="new-password"
          />
          <p class="helper-text" id="passwordHelper"></p>
        </div>

        <div class="form-group">
          <label for="passwordConfirm" class="form-label">비밀번호 확인*</label>
          <input
            type="password"
            id="passwordConfirm"
            class="form-input"
            placeholder="비밀번호를 한번 더 입력하세요"
            autocomplete="new-password"
          />
          <p class="helper-text" id="passwordConfirmHelper"></p>
        </div>

        <div class="form-group">
          <label for="nickname" class="form-label">닉네임*</label>
          <input
            type="text"
            id="nickname"
            class="form-input"
            placeholder="닉네임을 입력하세요"
            autocomplete="nickname"
          />
          <p class="helper-text" id="nicknameHelper"></p>
        </div>

        <button type="submit" class="signup-button" id="signupButton" disabled>
          회원가입
        </button>
      </form>

      <button type="button" class="login-link-button" id="loginLinkButton">
        로그인하러 가기
      </button>
    </section>
  </main>

  <script type="module" src="../js/signup.js"></script>
</body>
</html>
