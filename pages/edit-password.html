<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>크맵 - 비밀번호 수정</title>

  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/edit-password.css" />
</head>
<body>
  <header class="header">
    <h1 class="header__title">크맵</h1>

    <button type="button" class="header__profile-button" id="profileButton" aria-label="프로필 메뉴">
      <span class="header__profile-image"></span>
    </button>
  </header>

  <main class="edit-password-page">
    <div class="account-shell">
      <aside class="account-brand">
        <div class="account-brand__logo"><span class="account-brand__mark"></span><strong>크맵</strong></div>
        <div><p class="account-brand__eyebrow">SECURE ACCOUNT</p><h2>안전한 비밀번호로<br />계정을 보호하세요.</h2><p>다른 서비스에서 사용하지 않는 새로운 비밀번호를 권장합니다.</p></div>
      </aside>
    <section class="edit-password">
      <p class="account-form__eyebrow">계정 보안</p>
      <h2 class="edit-password__title">비밀번호 수정</h2>

      <form class="edit-password-form" id="editPasswordForm" novalidate>
        <div class="form-group">
          <label for="password" class="form-label">비밀번호</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="비밀번호를 입력하세요"
            autocomplete="new-password"
          />
          <p class="helper-text" id="passwordHelper"></p>
        </div>

        <div class="form-group">
          <label for="passwordConfirm" class="form-label">비밀번호 확인</label>
          <input
            type="password"
            id="passwordConfirm"
            class="form-input"
            placeholder="비밀번호를 한번 더 입력하세요"
            autocomplete="new-password"
          />
          <p class="helper-text" id="passwordConfirmHelper"></p>
        </div>

        <button type="submit" class="submit-button" id="submitButton" disabled>
          수정하기
        </button>
      </form>

      <p class="toast-message" id="toastMessage">수정 완료</p>
    </section>
    </div>
  </main>

  <script type="module" src="../js/edit-password.js"></script>
</body>
</html>
