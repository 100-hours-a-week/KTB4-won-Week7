<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무 말 대잔치 - 로그인</title>
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <header class="header">
    <h1 class="header__title">아무 말 대잔치</h1>
  </header>

  <main class="login-page">
    <section class="login">
      <h2 class="login__title">로그인</h2>

      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">이메일</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="이메일을 입력하세요"
            autocomplete="email"
          />
          <p class="helper-text" id="emailHelper"></p>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">비밀번호</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
          />
          <p class="helper-text" id="passwordHelper"></p>
        </div>

        <button type="submit" class="login-button" id="loginButton" disabled>
          로그인
        </button>
      </form>

      <button type="button" class="signup-button" id="signupButton">
        회원가입
      </button>
    </section>
  </main>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/login.css" />
<script type = "module"src="./js/login.js"></script>
</body>
</html>
